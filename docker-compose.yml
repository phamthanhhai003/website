services:
  db:
    image: mysql:8.0
    container_name: electroshop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: electronics_shop
      MYSQL_USER: admin123
      MYSQL_PASSWORD: admin123
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "admin123", "-padmin123"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: electroshop_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: admin123
      DB_PASS: admin123
      DB_NAME: electronics_shop
      SESSION_SECRET: electroshop-secret-key-2024-datn-hude
      UPLOAD_DIR: public/img
      MAX_FILE_SIZE: 5242880
      BANK_ACCOUNT_NUMBER: "0123456789"
      BANK_ACCOUNT_NAME: NGUYEN VAN A
      BANK_NAME: Vietcombank
    ports:
      - "3000:3000"
    volumes:
      - img_data:/app/public/img

  ngrok:
    image: ngrok/ngrok:latest
    container_name: electroshop_ngrok
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command:
      - "http"
      - "app:3000"
    ports:
      - "4040:4040"
    depends_on:
      - app

volumes:
  db_data:
  img_data:
